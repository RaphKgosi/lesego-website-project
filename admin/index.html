<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Lesego Website Admin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #sanity {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            flex-direction: column;
            gap: 10px;
        }

        #status {
            font-size: 12px;
            color: #999;
        }
    </style>
    <!-- 1. Global Styled Components -->
    <script src="https://unpkg.com/styled-components@6.1.1/dist/styled-components.browser.js"></script>
    <!-- 2. Sanity Global Bundle -->
    <script src="https://unpkg.com/sanity@3.31.0/dist/index.browser.js"></script>
</head>

<body>
    <div id="sanity">
        <div class="loading">
            <div>Loading Studio...</div>
            <div id="status">Initializing...</div>
        </div>
    </div>
    <noscript>Please enable JavaScript to use the Admin Panel</noscript>

    <script type="module">
        const statusEl = document.getElementById('status');

        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log(msg);
        }

        async function waitForSanity() {
            let attempts = 0;
            const maxAttempts = 100; // ~5 seconds

            while (typeof window.Sanity === 'undefined' && attempts < maxAttempts) {
                if (attempts % 10 === 0) { // Log every 10th attempt (every 500ms)
                    updateStatus(`Waiting for Sanity resources... (${attempts})`);
                }
                await new Promise(resolve => setTimeout(resolve, 50));
                attempts++;
            }

            if (typeof window.Sanity === 'undefined') {
                updateStatus('Failed: Sanity Global not found after timeout. Please refresh.');
                console.error('Sanity Global not found');
                return null;
            }

            updateStatus('Sanity resources loaded. Starting Studio...');
            return window.Sanity;
        }

        async function init() {
            const Sanity = await waitForSanity();

            if (!Sanity) return;

            const { renderStudio, defineConfig, deskTool, structureTool, visionTool } = Sanity;

            const plugins = [];
            // Prefer structureTool for v3, fallback to deskTool if needed
            if (typeof structureTool === 'function') {
                plugins.push(structureTool());
            } else if (typeof deskTool === 'function') {
                plugins.push(deskTool());
            }

            if (typeof visionTool === 'function') {
                plugins.push(visionTool());
            }

            const config = defineConfig({
                projectId: 'bbafqmmq',
                dataset: 'production',
                title: 'Lesego Website',
                // basePath removed
                useCdn: false,
                plugins: plugins,
                schema: {
                    types: [
                        {
                            name: 'post',
                            title: 'Post',
                            type: 'document',
                            fields: [
                                {
                                    name: 'title',
                                    title: 'Title',
                                    type: 'string',
                                },
                                {
                                    name: 'slug',
                                    title: 'Slug',
                                    type: 'slug',
                                    options: {
                                        source: 'title',
                                        maxLength: 96,
                                    },
                                },
                                {
                                    name: 'publishedAt',
                                    title: 'Published at',
                                    type: 'datetime',
                                },
                                {
                                    name: 'category',
                                    title: 'Category',
                                    type: 'string',
                                    initialValue: 'Journal'
                                },
                                {
                                    name: 'mainImage',
                                    title: 'Main image',
                                    type: 'image',
                                    options: {
                                        hotspot: true,
                                    },
                                },
                                {
                                    name: 'excerpt',
                                    title: 'Excerpt',
                                    type: 'text',
                                    description: 'Short summary for the blog card',
                                },
                                {
                                    name: 'body',
                                    title: 'Body',
                                    type: 'array',
                                    of: [
                                        {
                                            title: 'Block',
                                            type: 'block',
                                            styles: [
                                                { title: 'Normal', value: 'normal' },
                                                { title: 'H1', value: 'h1' },
                                                { title: 'H2', value: 'h2' },
                                                { title: 'H3', value: 'h3' },
                                                { title: 'Quote', value: 'blockquote' },
                                            ],
                                            lists: [{ title: 'Bullet', value: 'bullet' }],
                                            marks: {
                                                decorators: [
                                                    { title: 'Strong', value: 'strong' },
                                                    { title: 'Emphasis', value: 'em' },
                                                ],
                                            },
                                        },
                                        {
                                            type: 'image',
                                            options: { hotspot: true },
                                        },
                                    ],
                                },
                            ],
                        }
                    ]
                }
            });

            const mountPoint = document.getElementById('sanity');
            // Clear loading UI before rendering
            mountPoint.innerHTML = '';

            renderStudio(mountPoint, config);
            console.log('Studio Rendered');
        }

        init().catch(err => {
            console.error('Initialization error:', err);
            updateStatus('Error: ' + err.message);
        });
    </script>
</body>

</html>
