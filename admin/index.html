<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Lesego Website Admin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f0f0f0;
        }

        #sanity {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
        }
    </style>
    <!-- Polyfill for process.env (Required by many React/Sanity libraries) -->
    <script>
        window.process = {
            env: {
                NODE_ENV: 'production'
            }
        };
    </script>
</head>

<body>
    <div id="sanity"></div>
    <noscript>Please enable JavaScript to use the Admin Panel</noscript>

    <script type="module">
        // Import Sanity Studio dependencies from esm.sh
        // using specific versions to ensure compatibility
        import { renderStudio, defineConfig } from 'https://esm.sh/sanity@3.31.0'
        import { deskTool } from 'https://esm.sh/sanity@3.31.0/desk'
        import { visionTool } from 'https://esm.sh/@sanity/vision@3.31.0'

        console.log('Sanity Modules Loaded');

        const config = defineConfig({
            projectId: 'bbafqmmq',
            dataset: 'production',
            title: 'Lesego Website',
            // No basePath as requested to avoid loop issues on static hosts
            useCdn: false,
            plugins: [
                deskTool(),
                visionTool()
            ],
            schema: {
                types: [
                    {
                        name: 'post',
                        title: 'Post',
                        type: 'document',
                        fields: [
                            {
                                name: 'title',
                                title: 'Title',
                                type: 'string',
                            },
                            {
                                name: 'slug',
                                title: 'Slug',
                                type: 'slug',
                                options: {
                                    source: 'title',
                                    maxLength: 96,
                                },
                            },
                            {
                                name: 'publishedAt',
                                title: 'Published at',
                                type: 'datetime',
                            },
                            {
                                name: 'category',
                                title: 'Category',
                                type: 'string',
                                initialValue: 'Journal'
                            },
                            {
                                name: 'mainImage',
                                title: 'Main image',
                                type: 'image',
                                options: {
                                    hotspot: true,
                                },
                            },
                            {
                                name: 'excerpt',
                                title: 'Excerpt',
                                type: 'text',
                                description: 'Short summary for the blog card',
                            },
                            {
                                name: 'body',
                                title: 'Body',
                                type: 'array',
                                of: [
                                    {
                                        title: 'Block',
                                        type: 'block',
                                        styles: [
                                            { title: 'Normal', value: 'normal' },
                                            { title: 'H1', value: 'h1' },
                                            { title: 'H2', value: 'h2' },
                                            { title: 'H3', value: 'h3' },
                                            { title: 'Quote', value: 'blockquote' },
                                        ],
                                        lists: [{ title: 'Bullet', value: 'bullet' }],
                                        marks: {
                                            decorators: [
                                                { title: 'Strong', value: 'strong' },
                                                { title: 'Emphasis', value: 'em' },
                                            ],
                                        },
                                    },
                                    {
                                        type: 'image',
                                        options: { hotspot: true },
                                    },
                                ],
                            },
                        ],
                    }
                ]
            }
        });

        const mountPoint = document.getElementById('sanity');

        if (mountPoint) {
            renderStudio(mountPoint, config);
            console.log('Studio Rendered');
        } else {
            console.error('Mount point #sanity not found');
        }
    </script>
</body>

</html>
