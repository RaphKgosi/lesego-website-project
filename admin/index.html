<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Lesego Website Admin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #sanity {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
        }
    </style>
    <!-- 1. Global Styled Components -->
    <script src="https://unpkg.com/styled-components@6.1.1/dist/styled-components.browser.js"></script>
    <!-- 2. Sanity Global Bundle -->
    <script src="https://unpkg.com/sanity@3.31.0/dist/index.browser.js"></script>
</head>

<body>
    <div id="sanity"></div>
    <noscript>Please enable JavaScript to use the Admin Panel</noscript>

    <script type="module">
        console.log('Sanity Global:', window.Sanity);

        // Wait for sanity to load if not already ready (though script tags above are synchronous blocking)
        // We add a small safety check or just run directly since they are plain scripts.

        async function run() {
            console.log('Studio Initializing...');

            if (!window.Sanity) {
                console.error('Sanity Not Found');
                return;
            }

            const { renderStudio, defineConfig, deskTool, structureTool, visionTool } = window.Sanity;

            const plugins = [];
            // Prefer structureTool for v3, fallback to deskTool if needed
            if (typeof structureTool === 'function') {
                plugins.push(structureTool());
            } else if (typeof deskTool === 'function') {
                plugins.push(deskTool());
            }

            if (typeof visionTool === 'function') {
                plugins.push(visionTool());
            }

            const config = defineConfig({
                projectId: 'bbafqmmq',
                dataset: 'production',
                title: 'Lesego Website',
                // basePath removed as requested to avoid infinite loops in some static environments
                useCdn: false,
                plugins: plugins,
                schema: {
                    types: [
                        {
                            name: 'post',
                            title: 'Post',
                            type: 'document',
                            fields: [
                                {
                                    name: 'title',
                                    title: 'Title',
                                    type: 'string',
                                },
                                {
                                    name: 'slug',
                                    title: 'Slug',
                                    type: 'slug',
                                    options: {
                                        source: 'title',
                                        maxLength: 96,
                                    },
                                },
                                {
                                    name: 'publishedAt',
                                    title: 'Published at',
                                    type: 'datetime',
                                },
                                {
                                    name: 'category',
                                    title: 'Category',
                                    type: 'string',
                                    initialValue: 'Journal'
                                },
                                {
                                    name: 'mainImage',
                                    title: 'Main image',
                                    type: 'image',
                                    options: {
                                        hotspot: true,
                                    },
                                },
                                {
                                    name: 'excerpt',
                                    title: 'Excerpt',
                                    type: 'text',
                                    description: 'Short summary for the blog card',
                                },
                                {
                                    name: 'body',
                                    title: 'Body',
                                    type: 'array',
                                    of: [
                                        {
                                            title: 'Block',
                                            type: 'block',
                                            styles: [
                                                { title: 'Normal', value: 'normal' },
                                                { title: 'H1', value: 'h1' },
                                                { title: 'H2', value: 'h2' },
                                                { title: 'H3', value: 'h3' },
                                                { title: 'Quote', value: 'blockquote' },
                                            ],
                                            lists: [{ title: 'Bullet', value: 'bullet' }],
                                            marks: {
                                                decorators: [
                                                    { title: 'Strong', value: 'strong' },
                                                    { title: 'Emphasis', value: 'em' },
                                                ],
                                            },
                                        },
                                        {
                                            type: 'image',
                                            options: { hotspot: true },
                                        },
                                    ],
                                },
                            ],
                        }
                    ]
                }
            });

            const mountPoint = document.getElementById('sanity');
            renderStudio(mountPoint, config);
            console.log('Studio Rendered');
        }

        run();
    </script>
</body>

</html>
