<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Lesego Website Admin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #sanity {
            position: fixed;
            inset: 0;
        }
    </style>
</head>

<body>
    <div id="sanity"></div>
    <noscript>Please enable JavaScript to use the Admin Panel</noscript>

    <!-- Sanity Studio V3 Embedded Script -->
    <script src="https://unpkg.com/sanity@3/dist/index.browser.js"></script>

    <script type="module">
        // Using the global Sanity object provided by the script above
        const { renderStudio, defineConfig } = window.Sanity;

        const config = defineConfig({
            projectId: 'bbafqmmq',
            dataset: 'production',
            title: 'Lesego Website',
            basePath: '/admin',
            schema: {
                types: [
                    {
                        name: 'post',
                        title: 'Post',
                        type: 'document',
                        fields: [
                            {
                                name: 'title',
                                title: 'Title',
                                type: 'string',
                            },
                            {
                                name: 'slug',
                                title: 'Slug',
                                type: 'slug',
                                options: {
                                    source: 'title',
                                    maxLength: 96,
                                },
                            },
                            {
                                name: 'publishedAt',
                                title: 'Published at',
                                type: 'datetime',
                            },
                            {
                                name: 'category',
                                title: 'Category',
                                type: 'string',
                                initialValue: 'Journal'
                            },
                            {
                                name: 'mainImage',
                                title: 'Main image',
                                type: 'image',
                                options: {
                                    hotspot: true,
                                },
                            },
                            {
                                name: 'excerpt',
                                title: 'Excerpt',
                                type: 'text',
                                description: 'Short summary for the blog card',
                            },
                            {
                                name: 'body',
                                title: 'Body',
                                type: 'array',
                                of: [
                                    {
                                        title: 'Block',
                                        type: 'block',
                                        styles: [
                                            { title: 'Normal', value: 'normal' },
                                            { title: 'H1', value: 'h1' },
                                            { title: 'H2', value: 'h2' },
                                            { title: 'H3', value: 'h3' },
                                            { title: 'Quote', value: 'blockquote' },
                                        ],
                                        lists: [{ title: 'Bullet', value: 'bullet' }],
                                        marks: {
                                            decorators: [
                                                { title: 'Strong', value: 'strong' },
                                                { title: 'Emphasis', value: 'em' },
                                            ],
                                        },
                                    },
                                    {
                                        type: 'image',
                                        options: { hotspot: true },
                                    },
                                ],
                            },
                        ],
                    }
                ]
            }
        });

        renderStudio(document.getElementById('sanity'), config);
    </script>
</body>

</html>
